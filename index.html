<div class="container">
    <div class="header">
        <h1>🍱 DIGITAL KATERING PRO</h1>
        <span class="badge">Sekali Klik Hitung Semua</span>
    </div>
    <div class="content">
        <label>Nama Pelanggan</label>
        <input type="text" id="nama" placeholder="Bu Siti / Pak RT 05">

        <label>Tanggal Acara</label>
        <input type="date" id="tanggal">

        <label>Pilih Menu</label>
        <select id="menu">
            <option value="rendang">Rendang Daging</option>
            <option value="ayam">Ayam Bakar Madu</option>

            <option value="tumpeng">Tumpeng Mini</option>
        </select>

                <input type="number" id="porsi" placeholder="100" min="1">

                <input type="number" id="hargaJual" placeholder="25000" min="0">
            </div>

        <textarea id="catatan" rows="2" placeholder="Pedas, Alamat kirim, Jam kirim..."></textarea>

            <p id="outHpp"></p>
            <p id="outLaba"></p>
        </div>

        <button class="btn-wa" onclick="kirimWA()" id="btnWa" style="display:none;">📲 KIRIM NOTA KE WA PELANGGAN</button>

<script>
// Database resep per 100 porsi
const resep = {
    rendang: { daging: 15, santan: 20, bumbu: 1.5, hppPorsi: 18000, nama: "Rendang Daging" },
    ayam: { ayam: 12, bumbu: 1, madu: 0.5, hppPorsi: 15000, nama: "Ayam Bakar Madu" },
    nasibox: { beras: 8, ayam: 10, telur: 100, hppPorsi: 12000, nama: "Nasi Box Komplit" },
    tumpeng: { beras: 5, ayam: 8, telur: 50, hppPorsi: 20000, nama: "Tumpeng Mini" }
};

let dataTerakhir = {};

function hitung() {
    const nama = document.getElementById('nama').value || "Pelanggan";
    const tanggal = document.getElementById('tanggal').value;
    const menu = document.getElementById('menu').value;
    const porsi = parseFloat(document.getElementById('porsi').value) || 0;
    const hargaJual = parseFloat(document.getElementById('hargaJual').value) || 0;
    const catatan = document.getElementById('catatan').value;

    if(porsi <= 0 || hargaJual <= 0) {
        alert("Isi Jumlah Porsi & Harga Jual dulu Bu!");
        return;
    }

    const r = resep[menu];
    const faktor = porsi / 100;
    const totalHpp = r.hppPorsi * porsi;
    const omset = hargaJual * porsi;
    const laba = omset - totalHpp;

    // Tampilkan bahan
    let bahanText = "<b>Kebutuhan Bahan:</b><br>";
    for(let key in r) {
        if(key!== 'hppPorsi' && key!== 'nama') {
            const jumlah = (r[key] * faktor).toFixed(1);
            const satuan = key === 'telur'? 'butir' : 'kg';
            bahanText += `- ${key.charAt(0).toUpperCase() + key.slice(1)}: ${jumlah} ${satuan}<br>`;
        }
    }

    document.getElementById('outBahan').innerHTML = bahanText;
    document.getElementById('outOmset').innerHTML = `<b>Total Omset:</b> Rp ${omset.toLocaleString('id-ID')}`;
    document.getElementById('outHpp').innerHTML = `<b>Total HPP:</b> Rp ${totalHpp.toLocaleString('id-ID')}`;
    document.getElementById('outLaba').innerHTML = `<b>Perkiraan Laba:</b> Rp ${laba.toLocaleString('id-ID')}`;

    document.getElementById('hasil').style.display = 'block';
    document.getElementById('btnWa').style.display = 'block';

    // Simpan buat WA
    dataTerakhir = { nama, tanggal, menu: r.nama, porsi, hargaJual, omset, catatan };
}

function kirimWA() {
    const d = dataTerakhir;
    const teks = `*NOTA KATERING DIGITAL*%0A%0A*Pelanggan:* ${d.nama}%0A*Tanggal Acara:* ${d.tanggal}%0A*Menu:* ${d.menu}%0A*Jumlah:* ${d.porsi} porsi%0A*Harga:* Rp ${d.hargaJual.toLocaleString('id-ID')}/porsi%0A*Total:* Rp ${d.omset.toLocaleString('id-ID')}%0A%0A*Catatan:* ${d.catatan}%0A%0A_Terima kasih sudah order Bu!_%0A_Digital Katering Tulungagung_`;
    window.open(`https://wa.me/?text=${teks}`, '_blank');
}

function reset() {
    document.getElementById('nama').value = '';
    document.getElementById('porsi').value = '';
    document.getElementById('hargaJual').value = '';
    document.getElementById('catatan').value = '';
    document.getElementById('hasil').style.display = 'none';
    document.getElementById('btnWa').style.display = 'none';
}

// Set tanggal hari ini
document.getElementById('tanggal').valueAsDate = new Date();
</script>
